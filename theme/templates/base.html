<!DOCTYPE html>
<html lang="{% block html_lang %}{{ DEFAULT_LANG }}{% endblock html_lang %}">
    <head>
        <title>{% block title %}{{ SITENAME }}{% endblock title %}</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        {% assets filters="libsass", output="css/common.css", "css/common.scss" %}
            <link rel="stylesheet" href="/{{ASSET_URL}}">
        {% endassets %}
        <link rel="icon" type="mage/x-png" href="/{{THEME_STATIC_DIR}}/images/favicon.png">
        {% block page_styles %}{% endblock page_styles %}
    </head>
    <body>
        <header id="body-header">
            <h1>
                <a href="/">{{ SITENAME }}</a>
            </h1>
        </header>
        <main class="main-content">
            {% block content %}
            {% endblock content %}
        </main>
        {% block page_scripts %}{% endblock page_scripts %}
    </body>
</html>
