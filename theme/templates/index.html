{% extends "base.html" %}
{% block content %}
    <section>
        <h2>All articles</h2>
        <ol>
            {% for article in articles_page.object_list %}
                <li>
                    <article>
                        <header>
                            <h2>
                                <a href="{{ ARTICLE_OUTPUT_PATH }}/{{ article.url }}" rel="bookmark" title="Permalink to {{ article.title|striptags }}">{{ article.title }}</a>
                            </h2> 
                        </header>
                        <footer>
                            <time datetime="{{ article.date.isoformat() }}"> {{ article.locale_date }} </time>
                        </footer>
                        <div>{{ article.summary }}</div>
                    </article>
                </li>
            {% endfor %}
        </ol>
    </section>
{% endblock content %}
